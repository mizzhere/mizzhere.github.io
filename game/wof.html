<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <!-- PWA / Web App Settings -->
    <title>Wheel of Fortune - Vietnamese Edition</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    
    <!-- Dynamic Manifest for PWA installation -->
    <link rel="manifest" id="manifest-link" href="data:application/manifest+json,%7B%22name%22%3A%22Chi%E1%BA%BFc%20N%C3%B3n%20K%E1%BB%B3%20Di%E1%BB%87u%22%2C%22short_name%22%3A%22N%C3%B3n%20K%E1%BB%B3%20Di%E1%BB%87u%22%2C%22start_url%22%3A%22.%22%2C%22display%22%3A%22standalone%22%2C%22orientation%22%3A%22landscape%22%2C%22background_color%22%3A%22%23000000%22%2C%22theme_color%22%3A%22%232e1065%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22data%3Aimage%2Fsvg%2Bxml%3Bbase64%2CPHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxOTIiIGhlaWdodD0iMTkyIj48cmVjdCB3aWR0aD0iMTkyIiBoZWlnaHQ9IjE5MiIgZmlsbD0iIzJlMTA2NSIvPjx0ZXh0IHg9IjUwJSIgeT0iNTAlIiBmb250LXNpemU9IjgwIiBmaWxsPSIjZmZmIiB0ZXh0LWFuY2hvcj0ibWlkZGxlIiBkb21pbmFudC1iYXNlbGluZT0ibWlkZGxlIj5XPC90ZXh0Pjwvc3ZnPg%3D%3D%22%2C%22sizes%22%3A%22192x192%22%2C%22type%22%3A%22image%2Fsvg%2Bxml%22%7D%5D%7D">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Anime.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&family=Roboto+Condensed:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* --- GLOBAL & BACKGROUND --- */
        body {
            background-color: #000;
            background-image: radial-gradient(circle at 50% 100%, #2e1065 0%, #000000 70%);
            overflow: hidden; 
            font-family: 'Roboto Condensed', sans-serif;
            color: white;
            /* Sử dụng 100dvh để tương thích hoàn hảo với thanh địa chỉ mobile */
            height: 100dvh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            /* Tránh nút bị lấp bởi vùng an toàn của iPhone (Tai thỏ/Cằm) */
            padding-bottom: env(safe-area-inset-bottom);
        }

        /* --- CATEGORY STRIP --- */
        .category-container {
            display: flex;
            justify-content: center;
            margin-bottom: 1.5vh;
        }
        
        .category-strip {
            background: linear-gradient(180deg, #6366f1 0%, #4338ca 50%, #312e81 100%);
            border: 2px solid #a5b4fc;
            padding: 0.5vh 3vh;
            border-radius: 8px;
            color: white;
            font-weight: 700;
            font-size: min(2.5vh, 1.2rem);
            letter-spacing: 1px;
            text-transform: uppercase;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            min-width: 200px;
            text-align: center;
            text-shadow: 2px 2px 0px rgba(0,0,0,0.5);
            z-index: 10;
        }

        /* --- THE BOARD CONTAINER (Dynamic Scaling) --- */
        .board-wrapper {
            position: relative;
            /* Logic thông minh: Giới hạn chiều rộng dựa trên chiều cao tối đa cho phép.
               2.46 là tỷ lệ Aspect Ratio (16/6.5).
               Mặc định (khi có bàn phím): chiều cao tối đa là 42vh. */
            width: min(96vw, 1000px, 42vh * 2.46);
            aspect-ratio: 16/6.5; 
            
            display: flex;
            align-items: center;
            justify-content: center;
            background: #111;
            border: 0.5vh solid #2dd4bf; 
            box-shadow: 0 0 2vh #2dd4bf, inset 0 0 3vh rgba(0,0,0,0.8);
            border-radius: 1vh;
            padding: 1.5%; 
            cursor: pointer;
            
            transition: width 0.4s cubic-bezier(0.25, 0.8, 0.25, 1), box-shadow 0.3s ease, border-color 0.3s ease;
            will-change: width;
        }

        /* Khi ẩn bàn phím, bảng được phép to tới 65vh */
        .board-wrapper.expanded {
            width: min(96vw, 1000px, 65vh * 2.46);
        }

        .board-wrapper:hover {
            border-color: #34d399; 
            box-shadow: 0 0 3vh #34d399, inset 0 0 3vh rgba(0,0,0,0.8);
        }

        .board-inner-frame {
            width: 100%;
            height: 100%;
            background: #0f172a;
            border: 0.4vh solid #3b82f6;
            padding: 1.5% 0; 
            
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1.2%; 
            box-shadow: inset 0 0 30px #000;
            container-type: size;
        }

        .board-row {
            display: flex;
            gap: 0.8%; 
            width: 100%;
            justify-content: center;
            height: 23%; 
        }

        /* --- TILE GRAPHICS --- */
        .tile {
            height: 100%; 
            aspect-ratio: 3/4; 
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            
            font-family: 'Inter', sans-serif;
            font-weight: 900; 
            font-size: 16cqh; /* Font bám theo chiều cao của Container bảng */
            line-height: 1;
            
            box-sizing: border-box;
            transition: background-color 0.2s;
            padding: 0;
            margin: 0;
            overflow: hidden; 
        }
        
        .tile-content {
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .tile-empty {
            background-color: #004d26;
            border: 2px solid #002e15;
            background-image: 
                radial-gradient(circle at center, rgba(74, 222, 128, 0.4) 0%, transparent 40%),
                repeating-linear-gradient(45deg, rgba(255,255,255,0.03) 0px, transparent 2px, transparent 8px),
                repeating-linear-gradient(-45deg, rgba(255,255,255,0.03) 0px, transparent 2px, transparent 8px);
            box-shadow: inset 0 0 8px rgba(0,0,0,0.8);
        }

        .tile-hidden {
            background-color: #ffffff;
            border: 2px solid #94a3b8;
            box-shadow: 
                inset 0 0 15px rgba(255,255,255,1),
                inset 3px 3px 5px rgba(255,255,255,0.8),
                inset -3px -3px 5px rgba(0,0,0,0.2);
        }

        .tile-flash {
            background-color: #1d4ed8 !important;
            border: 2px solid #60a5fa !important;
            box-shadow: 0 0 20px #2563eb;
        }

        .tile-revealed {
            background-color: #ffffff;
            color: #000000;
            border: 2px solid #cbd5e1;
            box-shadow: inset 0 0 5px rgba(0,0,0,0.1);
        }

        /* --- CONTROLS & DYNAMIC KEYBOARD --- */
        .keyboard-row {
            display: flex;
            gap: 4px;
            justify-content: center;
            width: 100%;
        }

        .key-btn {
            background: linear-gradient(to bottom, #334155, #1e293b);
            border: 1px solid #475569;
            color: white;
            
            /* Kích thước được khống chế, không phình to quá lố */
            height: clamp(38px, 6vh, 55px);
            width: clamp(28px, 8vw, 45px);
            
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            font-family: 'Roboto Condensed', sans-serif;
            font-size: min(3vh, 1.2rem); 
            box-shadow: 0 0.4vh 0 #0f172a;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.1s, opacity 0.1s, box-shadow 0.1s;
        }
        
        .key-btn:hover { background: linear-gradient(to bottom, #475569, #334155); margin-top: -1px; }
        
        .key-btn:active { 
            transform: translateY(0.4vh); 
            box-shadow: none; 
        }
        
        .key-btn.used { 
            opacity: 0.4; 
            cursor: not-allowed; 
            background: #000;
            border-color: #333;
            box-shadow: none;
            transform: translateY(0.4vh);
        }
        .key-btn.correct { background: #1d4ed8; border-color: #3b82f6; opacity: 1; color: white; }

        /* Action Buttons Fixed Size & Wrap */
        .action-btn {
            padding: 0.5rem 1rem;
            border-radius: 9999px;
            color: white;
            font-weight: bold;
            font-size: min(2vh, 1rem);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            white-space: nowrap;
        }
        
        /* Cải thiện hiển thị Modal/Toast */
        .modal-bg {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            backdrop-filter: blur(8px);
            display: none; align-items: center; justify-content: center; z-index: 2000;
        }
        .modal-box {
            background: #1e293b; border: 1px solid #475569;
            padding: 2rem; border-radius: 12px; width: 90%; max-width: 500px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
        }

        #start-overlay {
            position: fixed; inset: 0; z-index: 9999;
            background: #0f0f15; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
        }

        #toast-container {
            position: fixed; top: 20px; right: 20px; z-index: 10000;
        }
        .toast {
            background: #1e293b; color: white; border-left: 4px solid #3b82f6;
            padding: 1rem; border-radius: 0.5rem; margin-bottom: 0.5rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
            display: flex; align-items: center; gap: 0.75rem;
            transform: translateX(120%); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .toast.show { transform: translateX(0); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.2s ease-out forwards; }
    </style>
</head>
<body>

    <!-- START OVERLAY -->
    <div id="start-overlay">
        <h1 class="text-4xl md:text-5xl font-bold mb-6 text-center bg-clip-text text-transparent bg-gradient-to-r from-teal-400 to-blue-500 font-['Inter']">WHEEL OF FORTUNE</h1>
        <p class="text-slate-400 mb-8 text-center px-4">Yêu cầu quyền mở Toàn màn hình & Giữ sáng thiết bị.</p>
        <button onclick="startGame()" class="px-8 py-4 bg-gradient-to-r from-blue-600 to-indigo-600 rounded-full text-white font-bold text-xl shadow-lg hover:scale-105 transition-transform shadow-blue-500/50">
            <i class="fa-solid fa-play mr-2"></i> BẮT ĐẦU CHƠI
        </button>
    </div>

    <!-- TOAST CONTAINER -->
    <div id="toast-container"></div>

    <!-- TOP SECTION: KHOẢNG TRỐNG CO GIÃN ĐỂ CHỨA BẢNG VÀ THÔNG TIN -->
    <!-- Sử dụng min-h-0 để phần tử con bên trong tự do co lại khi màn hình hẹp -->
    <div class="flex-grow flex flex-col items-center justify-center min-h-0 w-full pt-4 px-2 relative z-10">
        <!-- CATEGORY -->
        <div class="category-container">
            <div class="category-strip" id="category-text">CHỦ ĐỀ</div>
        </div>

        <!-- BOARD AREA (Nhấn để chuyển đổi) -->
        <div class="board-wrapper" id="board-wrapper-el" onclick="toggleKeyboard()" title="Chạm để Mở/Đóng bàn phím">
            <div class="board-inner-frame" id="board-grid">
                <!-- JS will generate rows here -->
            </div>
        </div>

        <!-- THÔNG TIN ĐÃ ĐOÁN (Hiện khi ẩn phím) -->
        <!-- Đặt chiều cao tối thiểu để không làm giật cục layout khi hiện chữ -->
        <div id="guessed-info-area" class="w-full mt-4 min-h-[60px] flex items-center justify-center"></div>
    </div>

    <!-- BOTTOM SECTION: BÀN PHÍM VÀ CÁC NÚT CHỨC NĂNG -->
    <div class="flex-none w-full px-2 pb-4 pt-2 flex flex-col items-center gap-3 bg-black/40 border-t border-white/5 relative z-20">
        
        <!-- BÀN PHÍM (Giới hạn độ rộng tối đa để cân đối trên Tablet/PC) -->
        <div id="keyboard-area" class="w-full max-w-[700px] flex flex-col gap-1.5 hidden"></div>
        
        <!-- CÁC NÚT ĐIỀU KHIỂN CHÍNH -->
        <div class="flex flex-wrap justify-center gap-2 md:gap-4 w-full">
            <button onclick="openModal()" class="action-btn bg-slate-700 hover:bg-slate-600 border border-slate-500">
                <i class="fa-solid fa-pen"></i> ĐẶT CÂU HỎI
            </button>
            <button onclick="autoSolve()" class="action-btn bg-emerald-700 hover:bg-emerald-600 border border-emerald-500">
                <i class="fa-solid fa-wand-magic-sparkles"></i> GIẢI Ô CHỮ
            </button>
            <button id="install-btn" style="display: none;" class="action-btn bg-indigo-700 hover:bg-indigo-600 border border-indigo-500">
                <i class="fa-solid fa-download"></i> TẢI APP
            </button>
        </div>
    </div>

    <!-- SETUP MODAL -->
    <div id="setup-modal" class="modal-bg">
        <div class="modal-box">
            <h3 class="text-xl font-bold text-white mb-4 border-b border-gray-600 pb-2">NHẬP DỮ LIỆU Ô CHỮ</h3>
            
            <label class="block text-sm text-gray-400 mb-1">CHỦ ĐỀ</label>
            <input type="text" id="inp-cat" class="w-full bg-gray-900 border border-gray-600 text-white p-3 rounded mb-4 focus:border-blue-500 outline-none uppercase font-bold" placeholder="VÍ DỤ: CA DAO TỤC NGỮ">
            
            <label class="block text-sm text-gray-400 mb-1">NỘI DUNG Ô CHỮ (TIẾNG VIỆT CÓ DẤU)</label>
            <textarea id="inp-puzzle" rows="3" class="w-full bg-gray-900 border border-gray-600 text-white p-3 rounded mb-1 focus:border-blue-500 outline-none font-mono uppercase text-lg" placeholder="VÍ DỤ: BẦU ƠI THƯƠNG LẤY BÍ CÙNG"></textarea>
            <p class="text-xs text-gray-500 mb-6 italic">Hệ thống sẽ tự động căn lề trái và xếp khối ở giữa bảng.</p>
            
            <div class="flex justify-end gap-3">
                <button onclick="closeModal()" class="px-4 py-2 text-gray-300 hover:text-white rounded hover:bg-slate-700">Hủy</button>
                <button onclick="confirmPuzzle()" class="px-6 py-2 bg-blue-600 hover:bg-blue-500 text-white font-bold rounded shadow-lg">Xác nhận</button>
            </div>
        </div>
    </div>

    <script>
        // --- 1. DEVICE APIS ---
        let wakeLock = null;
        let deferredPrompt;

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            const installBtn = document.getElementById('install-btn');
            installBtn.style.display = 'flex';
            
            installBtn.addEventListener('click', async () => {
                if (deferredPrompt) {
                    deferredPrompt.prompt();
                    const { outcome } = await deferredPrompt.userChoice;
                    if (outcome === 'accepted') {
                        installBtn.style.display = 'none';
                        showToast('Đã cài đặt lối tắt thành công!', 'success');
                    }
                    deferredPrompt = null;
                }
            });
        });

        async function requestWakeLock() {
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                }
            } catch (err) {}
        }

        document.addEventListener('visibilitychange', () => {
            if (wakeLock !== null && document.visibilityState === 'visible') requestWakeLock();
        });

        async function startGame() {
            document.getElementById('start-overlay').style.display = 'none';
            try {
                const elem = document.documentElement;
                if (elem.requestFullscreen) await elem.requestFullscreen();
                else if (elem.webkitRequestFullscreen) await elem.webkitRequestFullscreen();
            } catch (err) {}

            try {
                if (screen.orientation && screen.orientation.lock) await screen.orientation.lock('landscape');
            } catch (err) {}

            requestWakeLock();
            initGame("MỘT CÂY LÀM CHẲNG NÊN NON", "TỤC NGỮ");
        }

        function showToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast';
            
            let icon = '<i class="fa-solid fa-info-circle text-blue-400"></i>';
            if (type === 'success') {
                toast.style.borderLeftColor = '#10b981';
                icon = '<i class="fa-solid fa-circle-check text-emerald-400"></i>';
            } else if (type === 'error') {
                toast.style.borderLeftColor = '#ef4444';
                icon = '<i class="fa-solid fa-triangle-exclamation text-red-400"></i>';
            }
            
            toast.innerHTML = `${icon} <span>${message}</span>`;
            container.appendChild(toast);
            
            requestAnimationFrame(() => { requestAnimationFrame(() => { toast.classList.add('show'); }); });
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // --- 2. GAME LOGIC & LEFT-ALIGN ALGORITHM ---
        const BOARD_STRUCTURE = [12, 14, 14, 12];
        const KEYBOARD_LAYOUT = [
            "A Ă Â B C D Đ E Ê",
            "G H I K L M N O Ô Ơ",
            "P Q R S T U Ư V X Y" 
        ];

        const VIETNAMESE_ACCENTS_MAP = {
            'A': 'AÀÁẢÃẠ', 'Ă': 'ĂẰẮẲẴẶ', 'Â': 'ÂẦẤẨẪẬ',
            'E': 'EÈÉẺẼẸ', 'Ê': 'ÊỀẾỂỄỆ', 'I': 'IÌÍỈĨỊ',
            'O': 'OÒÓỎÕỌ', 'Ô': 'ÔỒỐỔỖỘ', 'Ơ': 'ƠỜỚỞỠỢ',
            'U': 'UÙÚỦŨỤ', 'Ư': 'ƯỪỨỬỮỰ', 'Y': 'YỲÝỶỸỴ',
            'Đ': 'Đ', 'D': 'D', 
        };

        let state = {
            puzzleRaw: "", puzzleBase: "", category: "",
            layout: [], guessedBase: new Set(),
            revealedIndices: new Set(), isSolved: false,
            isKeyboardVisible: false,
            isAutoSolving: false 
        };

        const uiGrid = document.getElementById('board-grid');
        const uiCategory = document.getElementById('category-text');
        const uiKeyboard = document.getElementById('keyboard-area');
        const uiGuessedInfo = document.getElementById('guessed-info-area');
        const boardWrapperEl = document.getElementById('board-wrapper-el');
        const modal = document.getElementById('setup-modal');
        const inpCat = document.getElementById('inp-cat');
        const inpPuzzle = document.getElementById('inp-puzzle');

        function getBaseChar(char) {
            char = char.toUpperCase();
            for (const [base, variants] of Object.entries(VIETNAMESE_ACCENTS_MAP)) {
                if (variants.includes(char)) return base;
            }
            return char; 
        }

        function calculateLayout(text) {
            const words = text.toUpperCase().trim().split(/\s+/);
            const lines = [];
            let currentLine = "";

            for (let word of words) {
                if (word.length > 14) word = word.slice(0, 14);
                let testLine = currentLine.length === 0 ? word : currentLine + " " + word;
                if (testLine.length <= 12) { 
                    currentLine = testLine; 
                } else { 
                    if (currentLine) lines.push(currentLine); 
                    currentLine = word; 
                }
            }
            if (currentLine) lines.push(currentLine);

            let startRowIndex = 0;
            if (lines.length === 1) startRowIndex = 1;
            else if (lines.length === 2) startRowIndex = 1;
            else if (lines.length === 3) startRowIndex = 0;

            let maxLineLength = 0;
            for (let line of lines) {
                if (line.length > maxLineLength) maxLineLength = line.length;
            }

            let globalStartCol = Math.floor((14 - maxLineLength) / 2);
            if (globalStartCol < 0) globalStartCol = 0;

            let finalGrid = [Array(12).fill(null), Array(14).fill(null), Array(14).fill(null), Array(12).fill(null)];
            const rowOffsets = [1, 0, 0, 1];

            for (let i = 0; i < lines.length && (startRowIndex + i) < 4; i++) {
                const lineStr = lines[i];
                const rowIndex = startRowIndex + i;

                for (let charIdx = 0; charIdx < lineStr.length; charIdx++) {
                    const char = lineStr[charIdx];
                    if (char !== " ") {
                        const visualCol = globalStartCol + charIdx;
                        const arrayIndex = visualCol - rowOffsets[rowIndex];

                        if (arrayIndex >= 0 && arrayIndex < BOARD_STRUCTURE[rowIndex]) {
                            finalGrid[rowIndex][arrayIndex] = char;
                        }
                    }
                }
            }
            return finalGrid;
        }

        function renderBoard() {
            uiGrid.innerHTML = '';
            
            state.layout.forEach((rowArr, rIdx) => {
                const rowDiv = document.createElement('div');
                rowDiv.className = 'board-row';
                
                rowArr.forEach((char, cIdx) => {
                    const tile = document.createElement('div');
                    tile.id = `tile-${rIdx}-${cIdx}`;
                    
                    if (char === null) {
                        tile.className = 'tile tile-empty';
                    } else {
                        const baseChar = getBaseChar(char);
                        const isSpecial = /[^A-ZĂÂĐÊÔƠƯ]/.test(baseChar); 
                        const isRevealed = state.revealedIndices.has(`${rIdx}-${cIdx}`) || isSpecial;
                        
                        if (isRevealed) {
                            tile.className = 'tile tile-revealed';
                            const span = document.createElement('span');
                            span.className = 'tile-content';
                            span.textContent = state.isSolved ? char : (isSpecial ? char : baseChar);
                            tile.appendChild(span);
                        } else {
                            tile.className = 'tile tile-hidden';
                        }
                    }
                    rowDiv.appendChild(tile);
                });
                uiGrid.appendChild(rowDiv);
            });
            
            uiCategory.textContent = state.category;
        }

        function toggleKeyboard() {
            if (state.isSolved || state.isAutoSolving) return; 
            state.isKeyboardVisible = !state.isKeyboardVisible;
            updateKeyboardUI();
        }

        function updateKeyboardUI() {
            if (state.isKeyboardVisible) {
                // Thu nhỏ bảng, hiện bàn phím, ẩn danh sách
                boardWrapperEl.classList.remove('expanded');
                
                uiGuessedInfo.innerHTML = ''; // Clear info
                uiGuessedInfo.style.display = 'none';
                
                uiKeyboard.style.display = 'flex';
                renderKeyboard();
            } else {
                // To bảng, hiện danh sách, ẩn bàn phím
                boardWrapperEl.classList.add('expanded');
                
                uiKeyboard.style.display = 'none';
                uiKeyboard.innerHTML = '';
                
                uiGuessedInfo.style.display = 'flex';
                renderGuessedInfo();
            }
        }

        function renderGuessedInfo() {
            if (state.isSolved || state.isAutoSolving) {
                uiGuessedInfo.innerHTML = '';
                return;
            }

            const correctList = [];
            const wrongList = [];
            
            state.guessedBase.forEach(char => {
                if (state.puzzleBase.includes(char)) correctList.push(char);
                else wrongList.push(char);
            });

            uiGuessedInfo.innerHTML = `
                <div class="flex flex-col items-center justify-center space-y-1 w-full animate-fade-in text-center">
                    <div class="flex flex-wrap justify-center items-center gap-2 text-base sm:text-xl w-full">
                        <span class="font-bold text-emerald-400"><i class="fa-solid fa-check"></i> ĐÃ ĐÚNG:</span>
                        <span class="text-white font-bold tracking-widest break-words">${correctList.join(', ') || 'Chưa có'}</span>
                    </div>
                    <div class="flex flex-wrap justify-center items-center gap-2 text-base sm:text-xl w-full mt-1">
                        <span class="font-bold text-red-400"><i class="fa-solid fa-xmark"></i> ĐÃ SAI:</span>
                        <span class="text-white font-bold tracking-widest opacity-70 break-words">${wrongList.join(', ') || 'Chưa có'}</span>
                    </div>
                </div>
            `;
        }

        function renderKeyboard() {
            uiKeyboard.innerHTML = '';
            
            KEYBOARD_LAYOUT.forEach(rowStr => {
                const rowDiv = document.createElement('div');
                rowDiv.className = 'keyboard-row animate-fade-in';
                const keys = rowStr.split(' '); 
                
                keys.forEach(keyChar => {
                    const btn = document.createElement('button');
                    btn.textContent = keyChar;
                    btn.className = 'key-btn';
                    
                    if (state.guessedBase.has(keyChar)) {
                        btn.classList.add('used');
                        if (state.puzzleBase.includes(keyChar)) btn.classList.add('correct');
                    } else {
                        btn.onclick = () => handleGuess(keyChar);
                    }
                    rowDiv.appendChild(btn);
                });
                uiKeyboard.appendChild(rowDiv);
            });
        }

        function handleGuess(baseChar) {
            if (state.isSolved || state.isAutoSolving || state.guessedBase.has(baseChar)) return;

            state.guessedBase.add(baseChar);
            let found = false;
            
            state.layout.forEach((row, r) => {
                row.forEach((char, c) => {
                    if (char && getBaseChar(char) === baseChar) {
                        found = true;
                        if (!state.revealedIndices.has(`${r}-${c}`)) {
                            flashTile(r, c, char); 
                            state.revealedIndices.add(`${r}-${c}`);
                        }
                    }
                });
            });

            if (found) {
                state.isKeyboardVisible = false;
            } else {
                showToast(`Không có ký tự ${baseChar}`, 'error');
            }
            
            updateKeyboardUI(); 
        }

        function flashTile(r, c, originalChar, showAccent = false) {
            const el = document.getElementById(`tile-${r}-${c}`);
            if (el) {
                el.className = 'tile tile-flash';
                setTimeout(() => {
                    el.className = 'tile tile-revealed';
                    const charToShow = (showAccent || state.isSolved) ? originalChar : getBaseChar(originalChar);
                    el.innerHTML = `<span class="tile-content">${charToShow}</span>`;
                }, 400); 
            }
        }

        function triggerWin() {
            if (state.isSolved) return;
            state.isSolved = true;
            state.isAutoSolving = false; 
            state.isKeyboardVisible = false;
            
            // Cập nhật lại UI: ẩn toàn bộ bàn phím và danh sách để clean màn hình
            updateKeyboardUI(); 
            uiGuessedInfo.innerHTML = '';

            renderBoard(); 
            anime({
                targets: '.tile-revealed',
                scale: [1, 1.1, 1],
                duration: 500,
                easing: 'easeInOutQuad',
                delay: anime.stagger(50)
            });
            showToast('Chúc mừng! Đã giải mã thành công.', 'success');
        }

        function autoSolve() {
            if (state.isSolved || state.isAutoSolving) return;
            state.isAutoSolving = true;
            
            const allBaseChars = new Set();
            state.layout.forEach(row => {
                row.forEach(char => {
                    if (char && /[A-ZĂÂĐÊÔƠƯ]/.test(getBaseChar(char))) {
                        allBaseChars.add(getBaseChar(char));
                    }
                });
            });

            const missingBase = [...allBaseChars].filter(b => !state.guessedBase.has(b));
            
            if (missingBase.length === 0) {
                triggerWin();
                return;
            }

            state.isKeyboardVisible = false; 
            updateKeyboardUI(); 

            let delay = 0;
            missingBase.forEach(baseChar => {
                setTimeout(() => { 
                    state.guessedBase.add(baseChar);
                    state.layout.forEach((row, r) => {
                        row.forEach((char, c) => {
                            if (char && getBaseChar(char) === baseChar && !state.revealedIndices.has(`${r}-${c}`)) {
                                flashTile(r, c, char, true); 
                                state.revealedIndices.add(`${r}-${c}`);
                            }
                        });
                    });
                }, delay);
                delay += 150; 
            });

            setTimeout(() => { triggerWin(); }, delay + 400);
        }

        function initGame(text, cat) {
            state.puzzleRaw = text.toUpperCase().trim();
            state.category = cat.toUpperCase() || "CHỦ ĐỀ";
            state.guessedBase.clear();
            state.revealedIndices.clear();
            state.isSolved = false;
            state.isAutoSolving = false;
            state.isKeyboardVisible = false; 
            state.puzzleBase = state.puzzleRaw.split('').map(c => getBaseChar(c)).join('');
            
            state.layout = calculateLayout(state.puzzleRaw);
            
            renderBoard();
            
            // Xóa rỗng các vùng để đảm bảo sạch sẽ đầu game
            uiKeyboard.style.display = 'none';
            uiGuessedInfo.innerHTML = '';
            
            updateKeyboardUI();
        }

        function openModal() {
            modal.style.display = 'flex';
            inpCat.value = state.category;
            inpPuzzle.value = state.puzzleRaw;
            inpPuzzle.focus();
        }
        function closeModal() { modal.style.display = 'none'; }
        function confirmPuzzle() {
            const t = inpPuzzle.value;
            const c = inpCat.value;
            if (t) { initGame(t, c); closeModal(); }
            else { showToast('Nội dung không được để trống!', 'error'); }
        }

        document.addEventListener('keydown', (e) => {
            if (modal.style.display === 'flex' || document.getElementById('start-overlay').style.display !== 'none') return;
            const k = e.key.toUpperCase();
            if (/[A-ZĂÂĐÊÔƠƯ]/.test(k) && k.length === 1) {
                handleGuess(getBaseChar(k));
            }
        });

    </script>
</body>
</html>
