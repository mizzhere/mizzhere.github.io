    <link rel="manifest" id="manifest-link" href="data:application/manifest+json,%7B%22name%22%3A%22Chi%E1%BA%BFc%20N%C3%B3n%20K%E1%BB%B3%20Di%E1%BB%87u%22%2C%22short_name%22%3A%22N%C3%B3n%20K%E1%BB%B3%20Di%E1%BB%87u%22%2C%22start_url%22%3A%22.%22%2C%22display%22%3A%22standalone%22%2C%22orientation%22%3A%22landscape%22%2C%22background_color%22%3A%22%23000000%22%2C%22theme_color%22%3A%22%232e1065%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22data%3Aimage%2Fsvg%2Bxml%3Bbase64%2CPHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxOTIiIGhlaWdodD0iMTkyIj48cmVjdCB3aWR0aD0iMTkyIiBoZWlnaHQ9IjE5MiIgZmlsbD0iIzJlMTA2NSIvPjx0ZXh0IHg9IjUwJSIgeT0iNTAlIiBmb250LXNpemU9IjgwIiBmaWxsPSIjZmZmIiB0ZXh0LWFuY2hvcj0ibWlkZGxlIiBkb21pbmFudC1iYXNlbGluZT0ibWlkZGxlIj5XPC90ZXh0Pjwvc3ZnPg%3D%3D%22%2C%22sizes%22%3A%22192x192%22%2C%22type%22%3A%22image%2Fsvg%2Bxml%22%7D%5D%7D">
    
    <!-- Tailwind CSS -->

    <!-- Google Fonts: Inter for board, Roboto Condensed for UI -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;900&family=Roboto+Condensed:wght@700&display=swap" rel="stylesheet">
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* --- GLOBAL & BACKGROUND --- */
        body {
            background-color: #000;
            background-image: radial-gradient(circle at 50% 100%, #2e1065 0%, #000000 70%);
            overflow: hidden; 
            font-family: 'Roboto Condensed', sans-serif;
            color: white;
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* --- THE BOARD CONTAINER --- */
        .board-wrapper {
            position: relative;
            height: 55vh; 
            width: auto; 
            aspect-ratio: 16/6.5; 
            max-width: 98vw; 
            display: flex;
            align-items: center;
            justify-content: center;
            background: #111;
            border: 0.6vh solid #2dd4bf; 
            box-shadow: 0 0 2vh #2dd4bf, inset 0 0 3vh rgba(0,0,0,0.8);
            padding: 1.5%;
            border-radius: 1vh;
            margin-bottom: 2vh; 
        }

        .board-inner-frame {
            width: 100%;
            height: 100%;
            background: #0f172a;
            border: 0.4vh solid #3b82f6;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1.2%; 
            padding: 1% 0;
            box-shadow: inset 0 0 30px #000;
        }

        .board-row {
            display: flex;
            gap: 0.8%; 
            width: 100%;
            justify-content: center;
            height: 23%; 
        }

        /* --- TILE GRAPHICS --- */
        .tile {
            height: 100%; 
            aspect-ratio: 3/4; 
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            font-weight: 900; 
            font-size: min(8vh, 5vw); 
            line-height: 1;
            box-sizing: border-box;
            transition: background-color 0.2s;
        }
        
        .tile-content {
            transform: scaleY(1.1); 
            margin-top: -2%; 
        }

        .tile-empty {
            background-color: #004d26;
            border: 2px solid #002e15;
            background-image: 
                radial-gradient(circle at center, rgba(74, 222, 128, 0.4) 0%, transparent 40%),
                repeating-linear-gradient(45deg, rgba(255,255,255,0.03) 0px, transparent 2px, transparent 8px),
                repeating-linear-gradient(-45deg, rgba(255,255,255,0.03) 0px, transparent 2px, transparent 8px);
            box-shadow: inset 0 0 8px rgba(0,0,0,0.8);
        }

        .tile-hidden {
            background-color: #ffffff;
            border: 2px solid #94a3b8;
            box-shadow: 
                inset 0 0 15px rgba(255,255,255,1),
                inset 3px 3px 5px rgba(255,255,255,0.8),
                inset -3px -3px 5px rgba(0,0,0,0.2);
        }

        .tile-flash {
            background-color: #1d4ed8 !important;
            border: 2px solid #60a5fa !important;
            box-shadow: 0 0 20px #2563eb;
        }

        .tile-revealed {
            background-color: #ffffff;
            color: #000000;
            border: 2px solid #cbd5e1;
            box-shadow: inset 0 0 5px rgba(0,0,0,0.1);
        }

        /* --- CATEGORY STRIP --- */
        .category-container {
            width: 100%;
            display: flex;
            justify-content: center;
            margin-bottom: 2vh;
            margin-top: -1vh; 
        }
        
        .category-strip {
            background: linear-gradient(180deg, #6366f1 0%, #4338ca 50%, #312e81 100%);
            border: 2px solid #a5b4fc;
            padding: 0.5vh 3vh;
            border-radius: 8px;
            color: white;
            font-weight: 700;
            font-size: min(2.5vh, 1.2rem);
            letter-spacing: 1px;
            text-transform: uppercase;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            min-width: 200px;
            text-align: center;
            text-shadow: 2px 2px 0px rgba(0,0,0,0.5);
            z-index: 10;
        }

        /* --- CONTROLS --- */
        .controls-wrapper {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1vh;
            position: relative;
            z-index: 50;
            padding-bottom: 2vh;
        }

        .keyboard-row {
            display: flex;
            gap: 0.5vw;
            justify-content: center;
            margin-bottom: 0.5vh;
        }

        .key-btn {
            background: linear-gradient(to bottom, #334155, #1e293b);
            border: 1px solid #475569;
            color: white;
            padding: 1.5vh 0;
            width: 4vw;
            max-width: 50px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            font-family: 'Roboto Condensed', sans-serif;
            font-size: min(2vh, 1rem);
            box-shadow: 0 0.4vh 0 #0f172a;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .key-btn:hover { background: linear-gradient(to bottom, #475569, #334155); margin-top: -1px; }
        .key-btn:active { transform: translateY(2px); box-shadow: none; }
        
        .key-btn.used { 
            opacity: 0.4; 
            cursor: not-allowed; 
            background: #000;
            border-color: #333;
            box-shadow: none;
            transform: translateY(2px);
        }
        .key-btn.correct { background: #1d4ed8; border-color: #3b82f6; opacity: 1; color: white; }

        /* MODAL & OVERLAY */
        .modal-bg {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            backdrop-filter: blur(8px);
            display: none; align-items: center; justify-content: center; z-index: 2000;
        }
        .modal-box {
            background: #1e293b; border: 1px solid #475569;
            padding: 2rem; border-radius: 12px; width: 90%; max-width: 600px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
        }

        /* Start Overlay - Ép tương tác để Fullscreen & WakeLock */
        #start-overlay {
            position: fixed; inset: 0; z-index: 9999;
            background: #0f0f15; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
        }

        /* TOAST */
        #toast-container {
            position: fixed; top: 20px; right: 20px; z-index: 10000;
        }
        .toast {
            background: #1e293b; color: white; border-left: 4px solid #3b82f6;
            padding: 1rem; border-radius: 0.5rem; margin-bottom: 0.5rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
            display: flex; align-items: center; gap: 0.75rem;
            transform: translateX(120%); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .toast.show { transform: translateX(0); }

    </style>
</head>
<body>

    <!-- START OVERLAY (Require User Interaction) -->
    <div id="start-overlay">
        <h1 class="text-4xl md:text-5xl font-bold mb-6 text-center bg-clip-text text-transparent bg-gradient-to-r from-teal-400 to-blue-500 font-['Inter']">WHEEL OF FORTUNE</h1>
        <p class="text-slate-400 mb-8 text-center px-4">Yêu cầu quyền mở Toàn màn hình & Giữ sáng thiết bị.</p>
        <button onclick="startGame()" class="px-8 py-4 bg-gradient-to-r from-blue-600 to-indigo-600 rounded-full text-white font-bold text-xl shadow-lg hover:scale-105 transition-transform shadow-blue-500/50">
            <i class="fa-solid fa-play mr-2"></i> BẮT ĐẦU CHƠI
        </button>
    </div>

    <!-- TOAST CONTAINER -->
    <div id="toast-container"></div>

    <!-- CATEGORY -->
    <div class="category-container">
        <div class="category-strip" id="category-text">CHỦ ĐỀ</div>
    </div>

    <!-- BOARD AREA -->
    <div class="board-wrapper">
        <div class="board-inner-frame" id="board-grid">
            <!-- JS will generate rows here -->
        </div>
    </div>

    <!-- CONTROLS -->
    <div class="controls-wrapper">
        <div id="keyboard-area"></div>
        
        <div class="flex gap-3 sm:gap-4 mt-1 flex-wrap justify-center">
            <button onclick="openModal()" class="px-5 py-2 rounded-full bg-slate-700 hover:bg-slate-600 text-white font-bold border border-slate-500 transition shadow-lg flex items-center gap-2 text-sm sm:text-base">
                <i class="fa-solid fa-pen"></i> ĐẶT CÂU HỎI
            </button>
            <button onclick="autoSolve()" class="px-5 py-2 rounded-full bg-emerald-700 hover:bg-emerald-600 text-white font-bold border border-emerald-500 transition shadow-lg flex items-center gap-2 text-sm sm:text-base">
                <i class="fa-solid fa-magic"></i> TỰ ĐỘNG GIẢI
            </button>
            <!-- Nút Cài đặt App (PWA) Ẩn mặc định -->
            <button id="install-btn" style="display: none;" class="px-5 py-2 rounded-full bg-indigo-700 hover:bg-indigo-600 text-white font-bold border border-indigo-500 transition shadow-lg flex items-center gap-2 text-sm sm:text-base">
                <i class="fa-solid fa-download"></i> TẢI APP
            </button>
        </div>
    </div>

    <!-- SETUP MODAL -->
    <div id="setup-modal" class="modal-bg">
        <div class="modal-box">
            <h3 class="text-xl font-bold text-white mb-4 border-b border-gray-600 pb-2">NHẬP DỮ LIỆU Ô CHỮ</h3>
            
            <label class="block text-sm text-gray-400 mb-1">CHỦ ĐỀ</label>
            <input type="text" id="inp-cat" class="w-full bg-gray-900 border border-gray-600 text-white p-3 rounded mb-4 focus:border-blue-500 outline-none uppercase font-bold" placeholder="VÍ DỤ: CA DAO TỤC NGỮ">
            
            <label class="block text-sm text-gray-400 mb-1">NỘI DUNG Ô CHỮ (TIẾNG VIỆT CÓ DẤU)</label>
            <textarea id="inp-puzzle" rows="3" class="w-full bg-gray-900 border border-gray-600 text-white p-3 rounded mb-1 focus:border-blue-500 outline-none font-mono uppercase text-lg" placeholder="VÍ DỤ: BẦU ƠI THƯƠNG LẤY BÍ CÙNG"></textarea>
            <p class="text-xs text-gray-500 mb-6 italic">Nhập tiếng Việt đầy đủ dấu.</p>
            
            <div class="flex justify-end gap-3">
                <button onclick="closeModal()" class="px-4 py-2 text-gray-300 hover:text-white rounded hover:bg-slate-700">Hủy</button>
                <button onclick="confirmPuzzle()" class="px-6 py-2 bg-blue-600 hover:bg-blue-500 text-white font-bold rounded shadow-lg">Xác nhận</button>
            </div>
        </div>
    </div>

    <script>
        // --- 1. DEVICE APIS (Wake Lock & Fullscreen & PWA) ---
        let wakeLock = null;
        let deferredPrompt;

        // PWA Install Event Listener
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            const installBtn = document.getElementById('install-btn');
            installBtn.style.display = 'flex';
            
            installBtn.addEventListener('click', async () => {
                if (deferredPrompt) {
                    deferredPrompt.prompt();
                    const { outcome } = await deferredPrompt.userChoice;
                    if (outcome === 'accepted') {
                        installBtn.style.display = 'none';
                        showToast('Đã cài đặt lối tắt thành công!', 'success');
                    }
                    deferredPrompt = null;
                }
            });
        });

        async function requestWakeLock() {
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                    wakeLock.addEventListener('release', () => {
                        console.log('Wake Lock was released');
                    });
                }
            } catch (err) {
                console.error('Wake Lock API Error:', err);
            }
        }

        // Tự động khôi phục Wake Lock khi mở lại tab
        document.addEventListener('visibilitychange', () => {
            if (wakeLock !== null && document.visibilityState === 'visible') {
                requestWakeLock();
            }
        });

        async function startGame() {
            // Ẩn Overlay
            document.getElementById('start-overlay').style.display = 'none';
            
            // Yêu cầu Fullscreen
            try {
                const elem = document.documentElement;
                if (elem.requestFullscreen) {
                    await elem.requestFullscreen();
                } else if (elem.webkitRequestFullscreen) { /* Safari */
                    await elem.webkitRequestFullscreen();
                } else if (elem.msRequestFullscreen) { /* IE11 */
                    await elem.msRequestFullscreen();
                }
            } catch (err) {
                console.warn('Không thể mở toàn màn hình:', err);
            }

            // Ép xoay ngang (Chỉ hoạt động tốt trên mobile khi đã Fullscreen)
            try {
                if (screen.orientation && screen.orientation.lock) {
                    await screen.orientation.lock('landscape');
                }
            } catch (err) {
                console.warn('Thiết bị không hỗ trợ ép xoay ngang. Hãy xoay thủ công.', err);
                if(window.innerWidth < window.innerHeight) {
                    showToast('Vui lòng xoay ngang điện thoại để trải nghiệm tốt nhất!', 'info');
                }
            }

            // Kích hoạt chống tắt màn hình
            requestWakeLock();
            
            // Vào game init
            initGame("MỘT CÂY LÀM CHẲNG NÊN NON", "TỤC NGỮ");
        }

        function showToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast';
            
            let icon = '<i class="fa-solid fa-info-circle text-blue-400"></i>';
            if (type === 'success') {
                toast.style.borderLeftColor = '#10b981';
                icon = '<i class="fa-solid fa-circle-check text-emerald-400"></i>';
            } else if (type === 'error') {
                toast.style.borderLeftColor = '#ef4444';
                icon = '<i class="fa-solid fa-triangle-exclamation text-red-400"></i>';
            }
            
            toast.innerHTML = `${icon} <span>${message}</span>`;
            container.appendChild(toast);
            
            // trigger animation
            requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                    toast.classList.add('show');
                });
            });

            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // --- 2. GAME LOGIC ---
        const BOARD_STRUCTURE = [12, 14, 14, 12];
        const KEYBOARD_LAYOUT = [
            "A Ă Â B C D Đ E Ê",
            "G H I K L M N O Ô Ơ",
            "P Q R S T U Ư V X Y" 
        ];

        const VIETNAMESE_ACCENTS_MAP = {
            'A': 'AÀÁẢÃẠ', 'Ă': 'ĂẰẮẲẴẶ', 'Â': 'ÂẦẤẨẪẬ',
            'E': 'EÈÉẺẼẸ', 'Ê': 'ÊỀẾỂỄỆ', 'I': 'IÌÍỈĨỊ',
            'O': 'OÒÓỎÕỌ', 'Ô': 'ÔỒỐỔỖỘ', 'Ơ': 'ƠỜỚỞỠỢ',
            'U': 'UÙÚỦŨỤ', 'Ư': 'ƯỪỨỬỮỰ', 'Y': 'YỲÝỶỸỴ',
            'Đ': 'Đ', 'D': 'D', 
        };

        let state = {
            puzzleRaw: "", puzzleBase: "", category: "",
            layout: [], guessedBase: new Set(),
            revealedIndices: new Set(), isSolved: false
        };

        const uiGrid = document.getElementById('board-grid');
        const uiCategory = document.getElementById('category-text');
        const uiKeyboard = document.getElementById('keyboard-area');
        const modal = document.getElementById('setup-modal');
        const inpCat = document.getElementById('inp-cat');
        const inpPuzzle = document.getElementById('inp-puzzle');

        function getBaseChar(char) {
            char = char.toUpperCase();
            for (const [base, variants] of Object.entries(VIETNAMESE_ACCENTS_MAP)) {
                if (variants.includes(char)) return base;
            }
            return char; 
        }

        function calculateLayout(text) {
            const words = text.toUpperCase().trim().split(/\s+/);
            const lines = [];
            let currentLine = "";

            for (let word of words) {
                if (word.length > 14) word = word.slice(0, 14);
                let testLine = currentLine.length === 0 ? word : currentLine + " " + word;
                if (testLine.length <= 14) { currentLine = testLine; } 
                else { lines.push(currentLine); currentLine = word; }
            }
            if (currentLine) lines.push(currentLine);

            let finalGrid = [Array(12).fill(null), Array(14).fill(null), Array(14).fill(null), Array(12).fill(null)];
            let startRowIndex = 0;

            if (lines.length === 1) startRowIndex = 1;
            else if (lines.length === 2) startRowIndex = 1;
            else if (lines.length === 3) startRowIndex = 0;
            
            for (let i = 0; i < lines.length && (startRowIndex + i) < 4; i++) {
                const lineStr = lines[i];
                const rowIndex = startRowIndex + i;
                const rowCapacity = BOARD_STRUCTURE[rowIndex];
                const safeStr = lineStr.slice(0, rowCapacity);
                const padding = Math.floor((rowCapacity - safeStr.length) / 2);
                
                for (let charIdx = 0; charIdx < safeStr.length; charIdx++) {
                    const char = safeStr[charIdx];
                    if (char !== " ") finalGrid[rowIndex][padding + charIdx] = char;
                }
            }
            return finalGrid;
        }

        function renderBoard() {
            uiGrid.innerHTML = '';
            
            state.layout.forEach((rowArr, rIdx) => {
                const rowDiv = document.createElement('div');
                rowDiv.className = 'board-row';
                
                rowArr.forEach((char, cIdx) => {
                    const tile = document.createElement('div');
                    tile.id = `tile-${rIdx}-${cIdx}`;
                    
                    if (char === null) {
                        tile.className = 'tile tile-empty';
                    } else {
                        const baseChar = getBaseChar(char);
                        const isSpecial = /[^A-ZĂÂĐÊÔƠƯ]/.test(baseChar); 
                        const isRevealed = state.revealedIndices.has(`${rIdx}-${cIdx}`) || isSpecial;
                        
                        if (isRevealed) {
                            tile.className = 'tile tile-revealed';
                            const span = document.createElement('span');
                            span.className = 'tile-content';
                            span.textContent = state.isSolved ? char : (isSpecial ? char : baseChar);
                            tile.appendChild(span);
                        } else {
                            tile.className = 'tile tile-hidden';
                        }
                    }
                    rowDiv.appendChild(tile);
                });
                uiGrid.appendChild(rowDiv);
            });
            
            uiCategory.textContent = state.category;
            renderKeyboard();
        }

        function renderKeyboard() {
            uiKeyboard.innerHTML = '';
            
            KEYBOARD_LAYOUT.forEach(rowStr => {
                const rowDiv = document.createElement('div');
                rowDiv.className = 'keyboard-row';
                const keys = rowStr.split(' '); 
                
                keys.forEach(keyChar => {
                    const btn = document.createElement('button');
                    btn.textContent = keyChar;
                    btn.className = 'key-btn';
                    
                    if (state.guessedBase.has(keyChar)) {
                        btn.classList.add('used');
                        if (state.puzzleBase.includes(keyChar)) btn.classList.add('correct');
                    } else {
                        btn.onclick = () => handleGuess(keyChar);
                    }
                    rowDiv.appendChild(btn);
                });
                uiKeyboard.appendChild(rowDiv);
            });
        }

        function handleGuess(baseChar) {
            if (state.isSolved || state.guessedBase.has(baseChar)) return;

            state.guessedBase.add(baseChar);
            let found = false;
            
            state.layout.forEach((row, r) => {
                row.forEach((char, c) => {
                    if (char && getBaseChar(char) === baseChar) {
                        found = true;
                        if (!state.revealedIndices.has(`${r}-${c}`)) {
                            flashTile(r, c, char); 
                            state.revealedIndices.add(`${r}-${c}`);
                        }
                    }
                });
            });

            renderKeyboard(); 
            if (found) checkWin();
            else showToast(`Không có ký tự ${baseChar}`, 'error');
        }

        function flashTile(r, c, originalChar) {
            const el = document.getElementById(`tile-${r}-${c}`);
            if (el) {
                el.className = 'tile tile-flash';
                setTimeout(() => {
                    el.className = 'tile tile-revealed';
                    el.innerHTML = `<span class="tile-content">${getBaseChar(originalChar)}</span>`;
                }, 500); 
            }
        }

        function checkWin() {
            let totalLetters = 0, totalRevealed = 0;
            state.layout.forEach((row, r) => {
                row.forEach((char, c) => {
                    if (char && /[A-ZĂÂĐÊÔƠƯ]/.test(getBaseChar(char))) {
                        totalLetters++;
                        if (state.revealedIndices.has(`${r}-${c}`)) totalRevealed++;
                    }
                });
            });

            if (totalLetters > 0 && totalLetters === totalRevealed) {
                state.isSolved = true;
                setTimeout(() => {
                    renderBoard();
                    anime({
                        targets: '.tile-revealed',
                        scale: [1, 1.1, 1],
                        duration: 500,
                        easing: 'easeInOutQuad',
                        delay: anime.stagger(50)
                    });
                    showToast('Chúc mừng! Đã giải mã thành công.', 'success');
                }, 800);
            }
        }

        function autoSolve() {
            if (state.isSolved) return;
            const allBaseChars = new Set();
            state.layout.forEach(row => {
                row.forEach(char => {
                    if (char && /[A-ZĂÂĐÊÔƠƯ]/.test(getBaseChar(char))) {
                        allBaseChars.add(getBaseChar(char));
                    }
                });
            });

            const missingBase = [...allBaseChars].filter(b => !state.guessedBase.has(b));
            let delay = 0;
            missingBase.forEach(baseChar => {
                setTimeout(() => { handleGuess(baseChar); }, delay);
                delay += 200; 
            });
        }

        function initGame(text, cat) {
            state.puzzleRaw = text.toUpperCase().trim();
            state.category = cat.toUpperCase() || "CHỦ ĐỀ";
            state.guessedBase.clear();
            state.revealedIndices.clear();
            state.isSolved = false;
            state.puzzleBase = state.puzzleRaw.split('').map(c => getBaseChar(c)).join('');
            state.layout = calculateLayout(state.puzzleRaw);
            renderBoard();
        }

        function openModal() {
            modal.style.display = 'flex';
            inpCat.value = state.category;
            inpPuzzle.value = state.puzzleRaw;
            inpPuzzle.focus();
        }
        function closeModal() { modal.style.display = 'none'; }
        function confirmPuzzle() {
            const t = inpPuzzle.value;
            const c = inpCat.value;
            if (t) { initGame(t, c); closeModal(); }
            else { showToast('Nội dung không được để trống!', 'error'); }
        }

        document.addEventListener('keydown', (e) => {
            if (modal.style.display === 'flex' || document.getElementById('start-overlay').style.display !== 'none') return;
            const k = e.key.toUpperCase();
            if (/[A-ZĂÂĐÊÔƠƯ]/.test(k) && k.length === 1) {
                handleGuess(getBaseChar(k));
            }
        });

    </script>
</body>
</html>
